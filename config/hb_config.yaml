# ==============================================================================
# GROMACS H-Bond Analysis Configuration (Core Parameter Control Panel)
# Please modify all calculation parameters in this section. For detailed parameter syntax and descriptions, please scroll down to the [Documentation & User Guide].
# ==============================================================================

system:
  gmx_cmd: "gmx"
  traj: "fit_0-1000-10.xtc"
  tpr: "md_0_1.tpr"
  outdir: "hbond_resd"
  force: true

groups:
  group1: "atomnr 1 to 824"
  group2: "atomnr 825 to 859"

pairs:
  mode: "exhaustive" 
  list_A: "A:1-26"
  list_B: "B:27-27"
  # If using "explicit" mode, please comment out list_A/B and use the following format:
  # explicit_list:
  #   - ["A:1", "B:27"]
  #   - ["A:2", "B:27"]

plot:
  occ_threshold: 10.0
  kde_threshold: 50.0
  clean_threshold: 1.0
  cbar_max: 3
  color_min: [255, 255, 255]
  color_max: [63, 169, 245]


# ==============================================================================
# ==============================================================================
# [Documentation & User Guide]
# ==============================================================================
# ==============================================================================

# ------------------------------------------
# 1. system (Basic System and File Configuration)
# ------------------------------------------
# - gmx_cmd : GROMACS execution command (typically "gmx" on Windows, or "gmx_mpi" in some HPC environments).
# - traj    : Trajectory file name (it is strongly recommended to use a clean trajectory with PBC treated and centered).
# - tpr     : Topology file name (used to extract atom names, residue numbers, and chain information).
# - outdir  : Output directory name (all logs, data, and charts will be saved here after the script runs).
# - force   : [true/false] Directory overwrite switch. When set to true, the outdir directory will be completely cleared before each run to ensure data is 100% clean and free of residual files.

# ------------------------------------------
# 2. groups (Macroscopic Group Definitions)
# ------------------------------------------
# [Function]: Used to calculate the total number of [ALL] hydrogen bonds between the two large entities, group1 and group2, over time.
#             The results will be plotted in the "upper section (global trend line chart)" of the final analysis panel.
# [Syntax]  : It is highly recommended to first run `python analyze_hbonds.py config.yaml --inspect` in the terminal.
#             Directly copy the "atomnr X to Y" absolute coordinate syntax generated by the Topology Inspector, which effectively prevents GROMACS chain recognition bugs.

# ------------------------------------------
# 3. pairs (Detailed Residue Pair Definition Matrix)
# ------------------------------------------
# [Function]: Determines the target search and matching strategy for micro/atomic-level analysis.
# - mode:
#   -> "exhaustive" (Global exhaustive search) : Automatically performs a cross-scanning permutation of all residues in list_A and list_B. Suitable for identifying unknown binding sites.
#   -> "explicit" (Precise one-to-one targeting) : Explicitly locks specified pairing relationships. Suitable for known definitive targets (e.g., specific base pairings in nucleic acids, key mutation validations).
# - list_A / list_B (For exhaustive mode only):
#   -> Supports chain prefix binding: "A:1-26"
#   -> Supports reverse order: "38-34" (automatically expands to 38, 37, 36, 35, 34)
#   -> Supports mixed lists: "A:1-10, A:25, B:40-45"
# - explicit_list (For explicit mode only):
#   -> Must be written in YAML array list format, strictly locking each pair of Targets, e.g.: ["A:1", "B:38"]

# ------------------------------------------
# 4. plot (Advanced Plotting and Auto-Cleanup Settings)
# ------------------------------------------
# - occ_threshold   : Plotting filter threshold (%). Hydrogen bonds with an occupancy lower than this value will be considered random noise and excluded from the final charts.
# - kde_threshold   : Core target threshold (%). The system will generate independent "distance-angle optimal conformation matrix plots" only for high-frequency pairs with an occupancy above this value.
# - clean_threshold : File cleanup threshold (%). The underlying .xvg/.ndx files generated during calculations will be automatically deleted if their occupancy falls below this value, freeing up disk space.
# - cbar_max        : Maximum scale limit for the heatmap color bar (typically set to 3 for nucleic acid double-strand hydrogen bonds, and 4 for protein binding interfaces).
# - color_min       : Lowest frequency color for the heatmap (RGB array, [255, 255, 255] represents pure white background).
# - color_max       : Highest frequency color for the heatmap (RGB array, [63, 169, 245] represents peak scientific blue). Colors can be customized.
