# ==============================================================================
# GROMACS Pi-Pi Stacking Analysis Configuration 
# ==============================================================================

system:
  gmx_cmd: "gmx"
  traj: "fit_0-500-5.xtc"
  tpr: "md_0_1.tpr"
  outdir: "pipi_resd1"
  force: true

criteria:
  dist_cutoff: 0.45  # Centroid distance threshold (nm)
  ang_cutoff: 30.0   # Plane deviation angle threshold (degrees)

# Aromatic ring library definition
# Tip: Standard nucleotides (A/G/C/U/T) and amino acids (PHE/TYR/TRP/HIS, etc.) are built-in and do not need to be declared here!
# Only non-standard ligands or mutated residues need to be stored here. You can directly copy and paste the code generated by the --inspect mode here:
rings:    #  Example
#  B_MOL1018_6R_1: {chain: "B", resnr: 1018, com_atoms: "C3 C6 C8 C10 C12 C14", plane_atoms: "C3 C8 C12"}
#  B_MOL1018_6R_2: {chain: "B", resnr: 1018, com_atoms: "N11 N13 C24 C25 C26 C27", plane_atoms: "N11 C24 C26"}
#  B_MOL1018_5R_3: {chain: "B", resnr: 1018, com_atoms: "N15 C28 C29 C30 C35", plane_atoms: "N15 C29 C30"}
#  B_MOL1018_6R_4: {chain: "B", resnr: 1018, com_atoms: "C30 C31 C32 C33 C34 C35", plane_atoms: "C30 C32 C34"}

  

# Pairing matrix strategy
pairs:
  mode: "exhaustive" 
  # Mixed pairing is supported! You can directly enter built-in standard ring names (e.g., G_6R, PHE_6R), or fill in the custom rings defined above
